name: HNG Stage 3 - API Test Suite

# When should this run?
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# What jobs should run?
jobs:

  # ============= JOB 1: TEST =============
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: Install dependencies (pytest, requests, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 4: Run the tests
      - name: Run tests
        id: run_tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          REGISTER_PASSWORD: ${{ secrets.REGISTER_PASSWORD }}
        run: |
          python -m pytest tests/ -v --junitxml=report.xml
      
      # Step 5: Save the test report (even if tests fail)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: report.xml


  # ============= JOB 2: NOTIFY (Email) =============
  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: test  # Wait for test job to finish
    if: always()  # Run even if tests fail
    
    steps:
      - name: Send email on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ HNG Stage 3 - Tests PASSED!"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            Good news! All tests passed successfully.
            
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Total tests passed: All 27 tests are green! ✅
      
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ HNG Stage 3 - Tests FAILED!"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            Something broke! Tests failed. Please check the logs.
            
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ⚠️ Please check the logs and fix the failing tests! ⚠️


  # ============= JOB 3: DEPLOY =============
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test  # Wait for test job to finish
    if: success()  # ONLY run if ALL tests passed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy step
        run: |
          echo "========================================"
          echo "🎉 TESTS PASSED! DEPLOYING NOW... 🎉"
          echo "========================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "========================================"
      
      - name: Deploy success message
        run: echo "✅ DEPLOYMENT COMPLETE! Tests passed, code is live."